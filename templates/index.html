{% extends "base.html" %}

{% block title %}ШИР — Интерактивное соревнование{% endblock %}

{% block content %}
<div class="container">
    
    <div class="buttons-wrapper">
        <div class="icon-btn team1" onclick="sendClick('team1')">
            <div class="fallback-text">Фото 1</div>
            <img src="/static/team1.jpg" alt="Команда 1" class="team-photo" onerror="this.style.opacity='0'">
        </div>
        
        <div class="icon-btn team2" onclick="sendClick('team2')">
            <div class="fallback-text">Фото 2</div>
            <img src="/static/team2.jpg" alt="Команда 2" class="team-photo" onerror="this.style.opacity='0'">
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const protocol = window.location.protocol === "https:" ? "wss" : "ws";
    const ws = new WebSocket(`${protocol}://${window.location.host}/ws`);

    function sendClick(team) {
        if (ws.readyState === WebSocket.OPEN) {
            ws.send(team);
        }
    }
</script>
{% endblock %}
